name: Build Solana Arbitrage Engine

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 180
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: dtolnay/rust-toolchain@stable
      
      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
          cache-dependency-path: 'src-tauri/frontend/package-lock.json'
      
      - name: Build frontend
        working-directory: src-tauri/frontend
        run: npm ci && npm run build
      
      - name: Build Rust backend (release)
        run: cargo build --release
        env:
          CARGO_PROFILE_RELEASE_CODEGEN_UNITS: 256
          CARGO_PROFILE_RELEASE_LTO: false
          TAURI_SKIP_VALIDATE: true
          TAURI_SKIP_WINRES_ICON: "1"
