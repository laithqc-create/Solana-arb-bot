name: Build Solana Arbitrage Engine

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 180
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: dtolnay/rust-toolchain@stable
      
      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
          cache-dependency-path: 'src-tauri/frontend/package-lock.json'
      
      - name: Build frontend
        working-directory: src-tauri/frontend
        run: npm ci && npm run build
      
      - name: Build Rust backend (release)
        run: cargo build --release
        env:
          CARGO_PROFILE_RELEASE_CODEGEN_UNITS: 256
          CARGO_PROFILE_RELEASE_LTO: false
      
      - name: Install Tauri CLI
        run: cargo install tauri-cli --locked
      
      - name: Build Tauri application (.exe installer)
        run: cargo tauri build
      
      - name: List build output
        shell: pwsh
        run: |
          Write-Host "Looking for .exe files..."
          Get-ChildItem -Path "src-tauri/target/release/bundle" -Recurse -Filter "*.exe" | ForEach-Object {
            Write-Host "Found: $_"
          }
          Write-Host ""
          Write-Host "Bundle directory structure:"
          Get-ChildItem -Path "src-tauri/target/release/bundle" -Recurse
      
      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: solana-arb-bot-windows-installer
          path: src-tauri/target/release/bundle/**/*.exe
          retention-days: 30
