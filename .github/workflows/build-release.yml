name: Build Solana Arbitrage Engine

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    name: Build Windows Release
    runs-on: windows-latest
    
    env:
      RUST_BACKTRACE: 1
      CARGO_PROFILE_RELEASE_CODEGEN_UNITS: 256
      CARGO_PROFILE_RELEASE_LTO: false
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
      
      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
      
      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'src-tauri/frontend/package-lock.json'
      
      - name: Install npm dependencies
        working-directory: src-tauri/frontend
        run: npm ci
      
      - name: Build frontend
        working-directory: src-tauri/frontend
        run: npm run build
      
      - name: Build Rust backend (Debug first)
        run: cargo build --locked
        timeout-minutes: 60
      
      - name: Build Rust backend (Release)
        run: cargo build --release --locked
        timeout-minutes: 120
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v3
        if: success()
        with:
          name: solana-arb-bot-windows
          path: |
            target/release/solana_arb_backend.exe
            target/release/bundle/nsis/*.exe
          retention-days: 30
      
      - name: Create Release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: Release ${{ github.ref }}
          draft: false
          prerelease: false
      
      - name: Upload Release Assets (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./target/release/bundle/nsis/solana-arb-bot_1.0.0_x64-setup.exe
          asset_name: solana-arb-bot-windows-installer.exe
          asset_content_type: application/octet-stream

  build-status:
    name: Build Status Check
    runs-on: ubuntu-latest
    needs: build-windows
    if: always()
    
    steps:
      - name: Check build result
        run: |
          if [ "${{ needs.build-windows.result }}" == "success" ]; then
            echo "✅ Build successful!"
            exit 0
          else
            echo "❌ Build failed"
            exit 1
          fi
